<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Tareas</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <header class="header">
      <h1 class="sekuya-regular">Lista de Tareas</h1>
    </header>

    <main class="container libre-baskerville">
      <form id="task-form">
        <div>
          <label class="form-label" for="task-input">Nueva tarea</label>
          <input
            id="task-input"
            name="task"
            type="text"
            placeholder="Escribe una tarea..."
            required
            autocomplete="off"
          />
        </div>
        <button type="submit" class="btn" id="add-task-btn">
          Agregar tarea
        </button>
      </form>

      <section class="task-list">
        <ul id="task-list"></ul>
      </section>

      <section class="actions">
        <button id="btn-dlt-completed" class="btn btn-dlt-completed">
          Eliminar completadas
        </button>
        <button id="btn-dlt-all" class="btn btn-dlt-all">Eliminar todas</button>
      </section>
    </main>

    <footer class="footer">
      <p>
        © 2026 Javier Cervera ·
        <a href="https://github.com/jacercen" target="_blank"> GitHub </a>
      </p>
    </footer>
    <script src="js/app.js"></script>
  </body>
</html>
